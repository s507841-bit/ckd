ues = data.map(d => d.y);\n  const maxY = Math.max(...values, 100);\n  const minY = Math.min(...values, 0);\n  const range = maxY - minY || 1;\n  const W = 320, H = 180, pad = 30;\n  const pts = data.map((d, i) => ({\n    x: pad + (i / (data.length - 1 || 1)) * (W - pad * 2),\n    y: pad + (1 - (d.y - minY) / range) * (H - pad * 2),\n  }));\n  const line = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');\n  return (\n    <div className=\"chart-area\">\n      <svg viewBox={\"0 0 \" + W + \" \" + H} className=\"chart-svg\">\n        {zones && zones.map((z, i) => {\n          const y1 = i === 0 ? H - pad : pad + (1 - ((zones[i-1].y) - minY) / range) * (H - pad * 2);\n          const y2 = pad + (1 - (z.y - minY) / range) * (H - pad * 2);\n          return <rect key={i} x={pad} y={Math.min(y1,y2)} width={W-pad*2} height={Math.abs(y1-y2)} fill={z.color} opacity=\"0.4\" />;\n        })}\n        <path d={line} fill=\"none\" stroke=\"var(--primary)\" strokeWidth=\"2.5\" strokeLinecap=\"round\" strokeLinejoin=\"round\" />\n        {pts.map((p, i) => (\n          <g key={i}>\n            <circle cx={p.x} cy={p.y} r=\"4\" fill=\"var(--primary)\" />\n            <text x={p.x} y={p.y-10} textAnchor=\"middle\" fontSize=\"10\" fill=\"var(--gray-600)\">{values[i]}</text>\n            <text x={p.x} y={H-5} textAnchor=\"middle\" fontSize=\"8\" fill=\"var(--gray-400)\">{data[i].x.slice(5)}</text>\n          </g>\n        ))}\n      </svg>\n    </div>\n  );\n}\n\nfunction Onboarding({ onComplete }) {\n  const [gender, setGender] = useState('male');\n  const [age, setAge] = useState('');\n  const [weight, setWeight] = useState('');\n  const [height, setHeight] = useState('');\n  const [dialysis, setDialysis] = useState(false);\n  const [diabetes, setDiabetes] = useState(false);\n  const submit = () => {\n    if (!age || !weight) return alert('나이와 체중은 필수 입력입니다.');\n    const p = { gender, age: Number(age), weight: Number(weight), height: Number(height)||0, dialysis, diabetes };\n    SS('kc_profile', p); onComplete(p);\n  };\n  return (\n    <div className=\"onboarding\">\n      <div className=\"onboarding-icon\">🏥</div>\n      <div className=\"onboarding-title\">KidneyCare</div>\n      <div className=\"onboarding-desc\">신장 건강을 스마트하게 관리하세요.<br/>기본 정보를 입력해주세요.</div>\n      <div className=\"onboarding-form\">\n        <div className=\"form-group\"><div className=\"form-label\">성별</div>\n          <div className=\"select-group\">\n            <button className={\"select-chip\" + (gender==='male'?' active':'')} onClick={()=>setGender('male')}>남성</button>\n            <button className={\"select-chip\" + (gender==='female'?' active':'')} onClick={()=>setGender('female')}>여성</button>\n          </div>\n        </div>\n        <div className=\"form-row\">\n          <div className=\"form-group\"><div className=\"form-label\">나이</div><input className=\"form-input\" type=\"number\" placeholder=\"55\" value={age} onChange={e=>setAge(e.target.value)}/></div>\n          <div className=\"form-group\"><div className=\"form-label\">체중 (kg)</div><input className=\"form-input\" type=\"number\" placeholder=\"65\" value={weight} onChange={e=>setWeight(e.target.value)}/></div>\n        </div>\n        <div className=\"form-group\"><div className=\"form-label\">키 (cm, 선택)</div><input className=\"form-input\" type=\"number\" placeholder=\"170\" value={height} onChange={e=>setHeight(e.target.value)}/></div>\n        <div className=\"card\">\n          <div className=\"toggle-row\"><span className=\"toggle-label\">투석 중</span><button className={\"toggle\"+(dialysis?' on':'')} onClick={()=>setDialysis(!dialysis)}><div className=\"toggle-knob\"></div></button></div>\n          <div className=\"toggle-row\"><span className=\"toggle-label\">당뇨 동반</span><button className={\"toggle\"+(diabetes?' on':'')} onClick={()=>setDiabetes(!diabetes)}><div className=\"toggle-knob\"></div></button></div>\n        </div>\n        <button className=\"btn btn-primary mt-8\" onClick={submit}>시작하기 →</button>\n      </div>\n    </div>\n  );\n}\n\nfunction Dashboard({ profile, labs, vitals }) {\n  const latest = labs[labs.length-1];\n  const stage = latest ? getCKDStage(latest.egfr) : null;\n  const info = stage ? STAGE_INFO[stage] : null;\n  const guide = getDietGuide(stage, profile.weight);\n  const lv = vitals[vitals.length-1];\n  return (\n    <div className=\"page\">\n      <div className=\"card\">\n        <div className={\"big-stage \"+(info?info.color:'stage-unknown')}>\n          <div className=\"big-stage-number\">{info?info.label:'미측정'}</div>\n          <div className=\"big-stage-label\">{info?info.desc:'검사 결과를 입력해주세요'}</div>\n          {latest && <div className=\"big-stage-gfr\">eGFR {latest.egfr} mL/min · {latest.date}</div>}\n        </div>\n      </div>\n      {info && <div className=\"card\"><div className=\"card-title\">💡 현재 상태</div><div className=\"diet-card\"><div className=\"diet-info\"><div className=\"diet-name\">{info.symptom}</div></div></div></div>}\n      {guide && <div className=\"card\"><div className=\"card-title\">🍽️ 일일 권장 섭취량</div><NutrientBars guide={guide}/></div>}\n      <div className=\"stat-grid\">\n        <div className=\"stat-item\"><div className=\"stat-value\">{labs.length}</div><div className=\"stat-label\">검사 기록</div></div>\n        <div className=\"stat-item\"><div className=\"stat-value\">{lv?lv.weight:'-'}</div><div className=\"stat-label\">체중(kg)</div></div>\n        <div className=\"stat-item\"><div className=\"stat-value\">{lv?lv.systolic+'/'+lv.diastolic:'-'}</div><div className=\"stat-label\">혈압</div></div>\n      </div>\n      <div className=\"disclaimer\"><span className=\"disclaimer-icon\">⚠️</span><span>이 정보는 일반적인 가이드라인이며, 실제 식단은 반드시 담당 의료진과 상담 후 결정하세요.</span></div>\n    </div>\n  );\n}\n\nfunction LabResults({ labs, setLabs }) {\n  const [form, setForm] = useState({ date: today() });\n  const [tab, setTab] = useState('input');\n  const [editingId, setEditingId] = useState(null);\n  const [toast, setToast] = useState('');\n  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2000); };\n  const allTests = [...BLOOD_TESTS, ...URINE_TESTS];\n  const validate = () => {\n    if (!form.egfr) { alert('eGFR는 필수 입력입니다.'); return false; }\n    const eg = Number(form.egfr);\n    if (eg < 0 || eg > 200) { alert('eGFR은 0~200 범위로 입력해주세요.'); return false; }\n    for (const t of allTests) {\n      if (form[t.key] !== undefined && form[t.key] !== '') {\n        const v = Number(form[t.key]);\n        if (v < 0) { alert(t.label + ' 값은 0 이상이어야 합니다.'); return false; }\n        if (t.absMax && v > t.absMax) { alert(t.label + ' 값이 비현실적입니다 (최대 ' + t.absMax + ').'); return false; }\n      }\n    }\n    return true;\n  };\n  const save = () => {\n    if (!validate()) return;\n    let nl;\n    if (editingId) {\n      nl = labs.map(l => l.id === editingId ? { ...form, id: editingId } : l);\n      setEditingId(null);\n      showToast('✅ 수정 완료');\n    } else {\n      nl = [...labs, { ...form, id: Date.now() }];\n      showToast('✅ 저장 완료');\n    }\n    setLabs(nl); SS('kc_labs', nl);\n    setForm({ date: today() });\n    setTimeout(() => setTab('history'), 600);\n  };\n  const startEdit = (l) => { setEditingId(l.id); setForm({ ...l }); setTab('input'); };\n  const cancelEdit = () => { setEditingId(null); setForm({ date: today() }); };\n  const del = id => { const nl = labs.filter(l=>l.id!==id); setLabs(nl); SS('kc_labs', nl); showToast('🗑️ 삭제 완료'); };\n  const stageNow = form.egfr ? getCKDStage(form.egfr) : null;\n  const renderTests = (tests, title) => (\n    <>\n      <div className=\"section-title\">{title}</div>\n      {tests.map(t => {\n        const st = getStatus(form[t.key], t.min, t.max);\n        const hintMax = t.max === 999 ? '' : t.max;\n        const hintStr = t.max === 999 ? t.min + '+' : t.min + '~' + hintMax;\n        return <div className=\"form-group\" key={t.key}>\n          <div className=\"form-label\">{st!=='none'&&<span className={\"result-indicator indicator-\"+st}></span>}{t.label} <span className=\"form-hint\">({t.unit}, 정상: {hintStr})</span></div>\n          <input className=\"form-input\" type=\"number\" step=\"0.1\" min=\"0\" max={t.absMax||''} placeholder={t.min+''} value={form[t.key]||''} onChange={e=>setForm({...form,[t.key]:e.target.value})}/>\n        </div>;\n      })}\n    </>\n  );\n  return (\n    <div className=\"page\">\n      {toast && <div className=\"toast\">{toast}</div>}\n      <div className=\"tabs\">\n        <button className={\"tab-btn\"+(tab==='input'?' active':'')} onClick={()=>setTab('input')}>{editingId ? '✏️ 수정 중' : '검사 입력'}</button>\n        <button className={\"tab-btn\"+(tab==='history'?' active':'')} onClick={()=>setTab('history')}>이력 ({labs.length})</button>\n        <button className={\"tab-btn\"+(tab==='trend'?' active':'')} onClick={()=>setTab('trend')}>트렌드</button>\n      </div>\n      {tab==='input' && <div className=\"card\">\n        <div className=\"card-title\">🩸 {editingId ? '검사 결과 수정' : '검사 결과 입력'}</div>\n        <div className=\"form-group\"><div className=\"form-label\">검사일</div><input className=\"form-input\" type=\"date\" value={form.date||''} onChange={e=>setForm({...form,date:e.target.value})}/></div>\n        {renderTests(BLOOD_TESTS, '🔬 혈액 검사')}\n        {renderTests(URINE_TESTS, '🧪 소변 검사')}\n        {stageNow && <div className={\"card stage-result \"+(STAGE_INFO[stageNow]?.color||'stage-unknown')}><strong>판별 결과: CKD {STAGE_INFO[stageNow]?.label}</strong><div className=\"stage-result-desc\">{STAGE_INFO[stageNow]?.desc}</div></div>}\n        <button className=\"btn btn-primary mt-8\" onClick={save}>💾 {editingId ? '수정 저장' : '저장하기'}</button>\n        {editingId && <button className=\"btn btn-outline mt-8\" onClick={cancelEdit}>수정 취소</button>}\n      </div>}\n      {tab==='history' && <div className=\"card\">\n        <div className=\"card-title\">📋 검사 이력</div>\n        {labs.length===0 ? <div className=\"empty-state\"><div className=\"empty-icon\">📭</div><div className=\"empty-text\">아직 검사 기록이 없습니다.</div></div>\n        : [...labs].reverse().map(l => {\n          const s = getCKDStage(l.egfr);\n          return <div className=\"history-item\" key={l.id}><div><div className=\"history-date\">{l.date}</div><div className=\"history-values\"><span>eGFR: {l.egfr}</span><span className={\"diet-badge stage-badge-sm \"+(STAGE_INFO[s]?.color||'')}>{STAGE_INFO[s]?.label}</span>{l.acr&&<span>ACR: {l.acr}</span>}</div></div><div className=\"history-actions\"><button className=\"btn btn-sm btn-outline\" onClick={()=>startEdit(l)}>수정</button><button className=\"btn btn-sm btn-danger\" onClick={()=>del(l.id)}>삭제</button></div></div>;\n        })}\n      </div>}\n      {tab==='trend' && <div className=\"card\">\n        <div className=\"card-title\">📈 eGFR 트렌드</div>\n        {labs.length<2 ? <div className=\"empty-state\"><div className=\"empty-icon\">📊</div><div className=\"empty-text\">2회 이상 검사 기록이 필요합니다.</div></div>\n        : <MiniChart data={labs.map(l=>({x:l.date,y:Number(l.egfr)}))} zones={[{y:15,color:'#fee2e2'},{y:30,color:'#fef3c7'},{y:60,color:'#fef9c3'},{y:90,color:'#dcfce7'}]}/>}\n      </div>}\n    </div>\n  );\n}\n\nfunction DietGuide({ profile, labs }) {\n  const latest = labs[labs.length-1];\n  const stage = latest ? getCKDStage(latest.egfr) : null;\n  const guide = getDietGuide(stage, profile.weight);\n  const tips = {\n    '1': [{e:'✅',t:'건강 식단 유지',d:'특별한 제한 없이 균형 잡힌 식사'},{e:'⚠️',t:'나트륨 제한 시작',d:'하루 2,000mg 이하'},{e:'💧',t:'충분한 수분',d:'하루 1.5~2L 권장'}],\n    '2': [{e:'🥩',t:'단백질 적정 섭취',d:'0.8g/kg/일'},{e:'🧂',t:'저염 식단',d:'국물 음식 줄이기'},{e:'🍎',t:'과일/채소 자유',d:'칼륨 제한 불필요'}],\n    '3a': [{e:'🥩',t:'단백질 제한 강화',d:'0.6~0.8g/kg/일'},{e:'🍌',t:'칼륨 주의',d:'바나나, 감자 등 주의'},{e:'🧀',t:'인 섭취 제한',d:'유제품, 가공식품 줄이기'}],\n    '3b': [{e:'🥩',t:'저단백 식단',d:'0.6~0.8g/kg/일 엄격 준수'},{e:'🍌',t:'칼륨 제한',d:'채소 데쳐 먹기'},{e:'💊',t:'인 결합제 복용 고려',d:'의사와 상담'}],\n    '4': [{e:'🥩',t:'저단백 + 고열량',d:'단백질은 줄이되 열량은 충분히'},{e:'🚫',t:'고칼륨 식품 금지',d:'과일 주스, 생채소 주의'},{e:'🏥',t:'투석 준비',d:'영양사 상담 권장'}],\n    '5': [{e:'🥩',t:'투석 시 고단백',d:'1.0~1.2g/kg/일'},{e:'💧',t:'수분 제한',d:'소변량 + 500ml'},{e:'⚡',t:'충분한 열량',d:'30~35kcal/kg/일'}],\n  };\n  const ct = stage ? (tips[stage]||tips['3a']) : null;\n  const safeFoods = ['쌀밥','오이','사과','배추','딸기'];\n  const cautionFoods = stage && Number(stage.replace(/[ab]/,''))>=3 ? ['바나나','시금치','감자','우유','라면'] : ['라면','김치'];\n  return (\n    <div className=\"page\">\n      <div className=\"disclaimer\"><span className=\"disclaimer-icon\">⚠️</span><span>이 정보는 일반적인 가이드라인이며, 실제 식단은 반드시 담당 의료진과 상담 후 결정하세요.</span></div>\n      {!stage ? <div className=\"card\"><div className=\"empty-state\"><div className=\"empty-icon\">🔬</div><div className=\"empty-text\">검사 결과를 먼저 입력해주세요.</div></div></div>\n      : <>\n        <div className=\"card\"><div className=\"card-title\">📌 CKD {STAGE_INFO[stage]?.label} 식단 핵심</div>\n          {ct && ct.map((t,i)=><div className=\"diet-card\" key={i}><div className=\"diet-emoji\">{t.e}</div><div className=\"diet-info\"><div className=\"diet-name\">{t.t}</div><div className=\"diet-detail\">{t.d}</div></div></div>)}\n        </div>\n        {guide && <div className=\"card\"><div className=\"card-title\">📊 일일 권장 섭취량 ({profile.weight}kg 기준)</div><NutrientBars guide={guide}/></div>}\n        <div className=\"card\"><div className=\"card-title\">🟢 권장 식품</div>\n          {safeFoods.map(name=>{const f=FOOD_DB.find(fd=>fd.name.includes(name));return f?<div className=\"diet-card\" key={name}><div className=\"diet-emoji\">{f.emoji}</div><div className=\"diet-info\"><div className=\"diet-name\">{f.name}</div><div className=\"diet-detail\">단백질 {f.protein}g · Na {f.sodium}mg · K {f.potassium}mg</div></div><span className=\"diet-badge badge-safe\">안전</span></div>:null;})}\n        </div>\n        <div className=\"card\"><div className=\"card-title\">🔴 주의 식품</div>\n          {cautionFoods.map(name=>{const f=FOOD_DB.find(fd=>fd.name.includes(name));return f?<div className=\"diet-card\" key={name}><div className=\"diet-emoji\">{f.emoji}</div><div className=\"diet-info\"><div className=\"diet-name\">{f.name}</div><div className=\"diet-detail\">단백질 {f.protein}g · Na {f.sodium}mg · K {f.potassium}mg</div></div><span className=\"diet-badge badge-avoid\">주의</span></div>:null;})}\n        </div>\n      </>}\n    </div>\n  );\n}\n\nconst CATEGORIES = ['전체','곡류','육류','수산물','달걀·유제품','채소','과일','기타'];\n\nfunction FoodSearch({ labs }) {\n  const [query, setQuery] = useState('');\n  const [cat, setCat] = useState('전체');\n  const latest = labs[labs.length-1];\n  const stage = latest ? getCKDStage(latest.egfr) : null;\n  const sn = stage ? Number(stage.replace(/[ab]/,'')) : 0;\n  const results = FOOD_DB.filter(f => (cat==='전체'||f.category===cat) && (query.length===0||f.name.includes(query)));\n  function safety(f) {\n    if (sn>=3 && f.potassium>300) return 'avoid';\n    if (f.sodium>500) return 'avoid';\n    if (sn>=3 && f.phosphorus>150) return 'caution';\n    if (f.sodium>200) return 'caution';\n    if (sn>=3 && f.potassium>200) return 'caution';\n    return 'safe';\n  }\n  const sLabel = {safe:'✅ 안전',caution:'⚠️ 주의',avoid:'❌ 제한'};\n  const sClass = {safe:'badge-safe',caution:'badge-caution',avoid:'badge-avoid'};\n  return (\n    <div className=\"page\">\n      <div className=\"search-box\"><span className=\"search-icon\">🔍</span><input className=\"form-input\" placeholder=\"식품명 검색 (예: 바나나, 두부)\" value={query} onChange={e=>setQuery(e.target.value)}/></div>\n      <div className=\"tabs\">{CATEGORIES.map(c=><button key={c} className={\"tab-btn\"+(cat===c?' active':'')} onClick={()=>setCat(c)}>{c}</button>)}</div>\n      {!stage && <div className=\"disclaimer disclaimer-info\"><span className=\"disclaimer-icon\">ℹ️</span><span>검사 결과 입력 후 CKD 단계별 안전도가 표시됩니다.</span></div>}\n      {results.map(f=>{\n        const s = stage ? safety(f) : null;\n        return <div className=\"food-result\" key={f.name}>\n          <div className=\"food-header\"><span className=\"food-name\">{f.emoji} {f.name}</span>{s&&<span className={\"diet-badge \"+sClass[s]}>{sLabel[s]}</span>}</div>\n          <div className=\"food-nutrients\">\n            <div className=\"food-nut-item nut-bg-protein\"><span className=\"food-nut-value\">{f.protein}g</span>단백질</div>\n            <div className={\"food-nut-item \"+(f.sodium>500?'nut-bg-sodium-high':'nut-bg-sodium-low')}><span className=\"food-nut-value\">{f.sodium}mg</span>나트륨</div>\n            <div className={\"food-nut-item \"+(f.potassium>300?'nut-bg-k-high':'nut-bg-k-low')}><span className=\"food-nut-value\">{f.potassium}mg</span>칼륨</div>\n            <div className={\"food-nut-item \"+(f.phosphorus>150?'nut-bg-p-high':'nut-bg-p-low')}><span className=\"food-nut-value\">{f.phosphorus}mg</span>인</div>\n          </div>\n        </div>;\n      })}\n      {results.length===0 && <div className=\"empty-state\"><div className=\"empty-icon\">🔍</div><div className=\"empty-text\">검색 결과가 없습니다.</div></div>}\n    </div>\n  );\n}\n\nfunction HealthRecords({ vitals, setVitals }) {\n  const [form, setForm] = useState({ date: today(), weight:'', systolic:'', diastolic:'' });\n  const [tab, setTab] = useState('input');\n  const save = () => {\n    if (!form.weight&&!form.systolic) return alert('체중 또는 혈압을 입력해주세요.');\n    const nv = [...vitals,{...form,id:Date.now()}]; setVitals(nv); SS('kc_vitals',nv);\n    setForm({date:today(),weight:'',systolic:'',diastolic:''});\n  };\n  const del = id => { const nv=vitals.filter(v=>v.id!==id); setVitals(nv); SS('kc_vitals',nv); };\n  return (\n    <div className=\"page\">\n      <div className=\"tabs\">\n        <button className={\"tab-btn\"+(tab==='input'?' active':'')} onClick={()=>setTab('input')}>기록 입력</button>\n        <button className={\"tab-btn\"+(tab==='history'?' active':'')} onClick={()=>setTab('history')}>이력 ({vitals.length})</button>\n        <button className={\"tab-btn\"+(tab==='chart'?' active':'')} onClick={()=>setTab('chart')}>그래프</button>\n      </div>\n      {tab==='input' && <div className=\"card\">\n        <div className=\"card-title\">📝 건강 기록 입력</div>\n        <div className=\"form-group\"><div className=\"form-label\">날짜</div><input className=\"form-input\" type=\"date\" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>\n        <div className=\"form-group\"><div className=\"form-label\">체중 (kg)</div><input className=\"form-input\" type=\"number\" step=\"0.1\" placeholder=\"65.0\" value={form.weight} onChange={e=>setForm({...form,weight:e.target.value})}/></div>\n        <div className=\"form-row\">\n          <div className=\"form-group\"><div className=\"form-label\">수축기 혈압</div><input className=\"form-input\" type=\"number\" placeholder=\"120\" value={form.systolic} onChange={e=>setForm({...form,systolic:e.target.value})}/></div>\n          <div className=\"form-group\"><div className=\"form-label\">이완기 혈압</div><input className=\"form-input\" type=\"number\" placeholder=\"80\" value={form.diastolic} onChange={e=>setForm({...form,diastolic:e.target.value})}/></div>\n        </div>\n        <button className=\"btn btn-primary\" onClick={save}>💾 저장하기</button>\n      </div>}\n      {tab==='history' && <div className=\"card\">\n        <div className=\"card-title\">📋 건강 기록 이력</div>\n        {vitals.length===0 ? <div className=\"empty-state\"><div className=\"empty-icon\">📭</div><div className=\"empty-text\">아직 건강 기록이 없습니다.</div></div>\n        : [...vitals].reverse().map(v=><div className=\"history-item\" key={v.id}><div><div className=\"history-date\">{v.date}</div><div className=\"history-values\">{v.weight&&<span>체중: {v.weight}kg</span>}{v.systolic&&<span>혈압: {v.systolic}/{v.diastolic}</span>}</div></div><button className=\"btn btn-sm btn-outline\" onClick={()=>del(v.id)}>삭제</button></div>)}\n      </div>}\n      {tab==='chart' && <>\n        <div className=\"card\"><div className=\"card-title\">⚖️ 체중 추이</div>\n          {vitals.filter(v=>v.weight).length<2 ? <div className=\"empty-state\"><div class assName={\"select-chip\"+(form.gender==='male'?' active':'')} onClick={()=>setForm({...form,gender:'male'})}>남성</button><button className={\"select-chip\"+(form.gender==='female'?' active':'')} onClick={()=>setForm({...form,gender:'female'})}>여성</button></div></div>\n          <div className=\"form-row\"><div className=\"form-group\"><div className=\"form-label\">나이</div><input className=\"form-input\" type=\"number\" value={form.age} onChange={e=>setForm({...form,age:Number(e.target.value)})}/></div><div className=\"form-group\"><div className=\"form-label\">체중(kg)</div><input className=\"form-input\" type=\"number\" value={form.weight} onChange={e=>setForm({...form,weight:Number(e.target.value)})}/></div></div>\n          <button className=\"btn btn-primary mt-8\" onClick={save}>저장</button>\n          <button className=\"btn btn-outline mt-8\" onClick={()=>setEditing(false)}>취소</button>\n        </>}\n      </div>\n      <div className=\"card\"><div className=\"card-title\">🗑️ 데이터 관리</div><button className=\"btn btn-danger\" onClick={()=>{if(confirm('모든 데이터를 삭제하시겠습니까?')){localStorage.clear();onReset();}}}>전체 데이터 초기화</button></div>\n    </div>\n  );\n}\n\nfunction App() {\n  const [profile, setProfile] = useState(LS('kc_profile',null));\n  const [labs, setLabs] = useState(LS('kc_labs',[]));\n  const [vitals, setVitals] = useState(LS('kc_vitals',[]));\n  const [tab, setTab] = useState('dashboard');\n  const latest = labs[labs.length-1];\n  const stage = latest ? getCKDStage(latest.egfr) : null;\n  const si = stage ? STAGE_INFO[stage] : null;\n  if (!profile) return <Onboarding onComplete={p=>setProfile(p)}/>;\n  const NAV = [{id:'dashboard',icon:'🏠',label:'대시보드'},{id:'lab',icon:'🩸',label:'검사'},{id:'diet',icon:'🍽️',label:'식단'},{id:'food',icon:'🔍',label:'식품검색'},{id:'vitals',icon:'💓',label:'건강기록'},{id:'profile',icon:'👤',label:'프로필'}];\n  return (\n    <div>\n      <div className=\"app-header\"><span className=\"app-header-icon\">🏥</span><span className=\"app-header-tit
